<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flacking-amoon-man</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #87ceeb;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; /* disable double-tap zoom + pinch */
    overscroll-behavior: none;  /* disable pull-to-refresh */
    height: 100%;
    width: 100%;
  }
  canvas {
    display: block;
  }
  #splash {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
  }
  #splash .card {
    background: white;
    padding: 36px 56px;
    border-radius: 22px;
    text-align: center;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.35);
    transform: rotate(-2deg);
  }
  #splash .big {
    font-size: 36px;
    font-weight: 900;
    color: #ff3b30;
    letter-spacing: 2px;
  }
  #splash .small {
    font-size: 22px;
    font-weight: 700;
    color: #333;
    margin-top: 14px;
    letter-spacing: 1px;
  }
  #title {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    pointer-events: none;
    z-index: 10;
    text-align: center;
  }
  #score {
    margin-top: 4px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  #score .best {
    opacity: 0.85;
    margin-left: 18px;
  }
  #sound {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    right: max(14px, env(safe-area-inset-right));
    z-index: 11;
    background: rgba(255,255,255,0.85);
    border: 2px solid rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    color: #333;
    cursor: pointer;
    font-family: inherit;
    touch-action: manipulation;
  }
  #sound:hover { background: white; }
</style>
</head>
<body>
<div id="title">
  FLACKING-AMOON-MAN
  <div id="score">SCORE: <span id="scoreVal">0</span><span class="best">BEST: <span id="bestVal">0</span></span></div>
</div>
<button id="sound">SOUND: ON</button>
<canvas id="game"></canvas>
<div id="splash">
  <div class="card">
    <div class="big">FLACKING-AMOON-MAN</div>
    <div class="small">CLICK TO START</div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const COLORS = [
    '#ff3b30', '#34c759', '#007aff', '#ffcc00',
    '#af52de', '#ff9500', '#ff2d92', '#5ac8fa',
  ];

  let currentMan = null;
  let particles = [];
  let flash = 0;
  let shake = 0;
  let wrongFlash = { left: 0, right: 0 };

  // --- score ---
  let score = 0;
  let highScore = parseInt(localStorage.getItem('flack.highScore') || '0', 10) || 0;
  const scoreEl = document.getElementById('scoreVal');
  const bestEl = document.getElementById('bestVal');
  function renderScore() {
    scoreEl.textContent = score;
    bestEl.textContent = highScore;
  }
  renderScore();

  // --- audio ---
  let audioCtx = null;
  let soundEnabled = localStorage.getItem('flack.sound') !== 'off';
  const soundBtn = document.getElementById('sound');
  function renderSoundBtn() {
    soundBtn.textContent = 'SOUND: ' + (soundEnabled ? 'ON' : 'OFF');
  }
  renderSoundBtn();
  soundBtn.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    localStorage.setItem('flack.sound', soundEnabled ? 'on' : 'off');
    renderSoundBtn();
    if (soundEnabled) ensureAudio();
    soundBtn.blur(); // so Shift presses don't activate the button
  });

  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }
  function playPop() {
    if (!soundEnabled || !audioCtx) return;
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(660, t);
    o.frequency.exponentialRampToValueAtTime(120, t + 0.25);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);
    o.stop(t + 0.32);

    // sparkle
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(900, t);
    o2.frequency.exponentialRampToValueAtTime(1800, t + 0.18);
    g2.gain.setValueAtTime(0.25, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o2.connect(g2).connect(audioCtx.destination);
    o2.start(t);
    o2.stop(t + 0.22);
  }

  // --- spawning ---
  function spawnMan() {
    const side = Math.random() < 0.5 ? 'left' : 'right';
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const xMin = side === 'left' ? 0.15 : 0.55;
    const xMax = side === 'left' ? 0.45 : 0.85;
    const x = canvas.width * (xMin + Math.random() * (xMax - xMin));
    currentMan = {
      side,
      color,
      x,
      baseY: canvas.height - 70,
      spawnedAt: performance.now(),
      // unique seed so each spawn flails differently
      seed: Math.random() * 1000,
      firstTry: true,
    };
  }

  function destroyMan() {
    if (!currentMan) return;
    const m = currentMan;
    if (m.firstTry) {
      score++;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('flack.highScore', String(highScore));
      }
      renderScore();
    }
    // smoke + colored sparkle particles up the body's height
    for (let i = 0; i < 50; i++) {
      const ang = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 5;
      particles.push({
        x: m.x + (Math.random() - 0.5) * 80,
        y: m.baseY - 100 - Math.random() * 280,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed - 1,
        r: 14 + Math.random() * 30,
        life: 1,
        decay: 0.012 + Math.random() * 0.015,
        kind: Math.random() < 0.5 ? 'smoke' : 'spark',
        color: m.color,
      });
    }
    flash = 1;
    shake = 14;
    playPop();
    currentMan = null;
    setTimeout(spawnMan, 700);
  }

  // --- input ---
  let firedForCurrent = false;
  function handleShift(side) {
    if (!currentMan) return;
    if (currentMan.side === side) {
      if (firedForCurrent) return;
      firedForCurrent = true;
      destroyMan();
      setTimeout(() => { firedForCurrent = false; }, 100);
    } else {
      // wrong side — reset score, disqualify this man, and flash that side red
      currentMan.firstTry = false;
      wrongFlash[side] = 1;
      if (score !== 0) {
        score = 0;
        renderScore();
      }
    }
  }
  window.addEventListener('keydown', (e) => {
    ensureAudio();
    if (e.repeat) return;
    if (e.code === 'ShiftLeft') handleShift('left');
    else if (e.code === 'ShiftRight') handleShift('right');
  });
  // Allow tapping the corresponding side (primary input on mobile)
  window.addEventListener('pointerdown', (e) => {
    ensureAudio();
    if (e.target && e.target.id === 'sound') return; // don't intercept sound button
    if (document.getElementById('splash')) return;   // splash still up, ignore the start tap
    if (currentMan) {
      const half = e.clientX < canvas.width / 2 ? 'left' : 'right';
      handleShift(half);
    }
  });

  // --- drawing the tube man ---
  function tubeManSegments(man, t) {
    const segments = 22;
    const segLen = 20;
    const points = [{ x: man.x, y: man.baseY }];
    for (let i = 0; i < segments; i++) {
      const ratio = (i + 1) / segments;
      const ampl = ratio * ratio * 0.85;
      const tt = t * 0.001;
      const s = man.seed;
      const angle = -Math.PI / 2
        + Math.sin(tt * 5.2 + s + i * 0.45) * ampl
        + Math.sin(tt * 8.1 + s * 1.3 + i * 0.27) * ampl * 0.55
        + Math.sin(tt * 2.3 + s * 0.7) * ampl * 0.25;
      const prev = points[points.length - 1];
      points.push({
        x: prev.x + Math.cos(angle) * segLen,
        y: prev.y + Math.sin(angle) * segLen,
      });
    }
    return points;
  }

  function drawArm(base, t, color, dir, seed) {
    const segs = 9;
    const segLen = 16;
    const pts = [{ x: base.x, y: base.y }];
    for (let i = 0; i < segs; i++) {
      const ratio = (i + 1) / segs;
      const ampl = 0.5 + ratio * 0.9;
      const tt = t * 0.001;
      const baseAngle = dir > 0 ? -0.3 : Math.PI + 0.3;
      const angle = baseAngle
        + Math.sin(tt * 7 + seed + i * 0.7) * ampl
        + Math.sin(tt * 11 + seed * 1.7 + i * 0.4) * ampl * 0.5;
      const prev = pts[pts.length - 1];
      pts.push({
        x: prev.x + Math.cos(angle) * segLen,
        y: prev.y + Math.sin(angle) * segLen,
      });
    }
    // arm body
    ctx.strokeStyle = color;
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    // hand glove
    const tip = pts[pts.length - 1];
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function drawTubeMan(man, t) {
    const points = tubeManSegments(man, t);

    // shadow on ground
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(man.x, man.baseY + 18, 50, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // body — main color
    ctx.strokeStyle = man.color;
    ctx.lineWidth = 32;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();

    // body stripes (alternating darker bands)
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 32;
    for (let i = 1; i < points.length; i++) {
      if (i % 4 === 0 || i % 4 === 1) continue;
      const a = points[i - 1], b = points[i];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // body outline highlight (lighter shine)
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    points.forEach((p, i) => {
      const offX = -6;
      if (i === 0) ctx.moveTo(p.x + offX, p.y);
      else ctx.lineTo(p.x + offX, p.y);
    });
    ctx.stroke();

    // arms branching from segment ~16 (upper body)
    const armBase = points[16];
    drawArm(armBase, t, man.color, 1, man.seed + 7);
    drawArm(armBase, t, man.color, -1, man.seed + 13);

    // head at top
    const head = points[points.length - 1];
    const prevHead = points[points.length - 2];
    const headAng = Math.atan2(head.y - prevHead.y, head.x - prevHead.x) + Math.PI / 2;
    drawHead(head.x, head.y - 6, headAng, man.color);

    // base/blower
    ctx.fillStyle = '#444';
    roundRect(man.x - 36, man.baseY - 12, 72, 28, 6, true, false);
    ctx.fillStyle = '#222';
    roundRect(man.x - 44, man.baseY + 14, 88, 12, 4, true, false);
    // grill lines
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    for (let gx = -28; gx <= 28; gx += 8) {
      ctx.beginPath();
      ctx.moveTo(man.x + gx, man.baseY - 8);
      ctx.lineTo(man.x + gx, man.baseY + 12);
      ctx.stroke();
    }
  }

  function drawHead(x, y, ang, color) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(ang);

    // head ball
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(-10, -12, 8, 5, -0.5, 0, Math.PI * 2);
    ctx.fill();

    // tuft of hair on top
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-6, -28);
    ctx.lineTo(0, -46);
    ctx.lineTo(6, -28);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -46, 6, 0, Math.PI * 2);
    ctx.fill();

    // eyes (whites)
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-10, -6, 8, 0, Math.PI * 2);
    ctx.arc(10, -6, 8, 0, Math.PI * 2);
    ctx.fill();
    // pupils
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-9, -5, 4, 0, Math.PI * 2);
    ctx.arc(11, -5, 4, 0, Math.PI * 2);
    ctx.fill();
    // pupil shines
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-7.5, -6.5, 1.5, 0, Math.PI * 2);
    ctx.arc(12.5, -6.5, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // big silly grin
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(0, 10, 13, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // tongue
    ctx.fillStyle = '#ff6b8b';
    ctx.beginPath();
    ctx.ellipse(0, 13, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function roundRect(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  // --- background scenery ---
  const clouds = [];
  for (let i = 0; i < 5; i++) {
    clouds.push({
      x: Math.random() * 2000,
      y: 60 + Math.random() * 180,
      s: 0.5 + Math.random() * 0.7,
      speed: 0.15 + Math.random() * 0.2,
    });
  }
  function drawCloud(x, y, s) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.arc(x, y, 22 * s, 0, Math.PI * 2);
    ctx.arc(x + 22 * s, y - 6 * s, 26 * s, 0, Math.PI * 2);
    ctx.arc(x + 48 * s, y, 22 * s, 0, Math.PI * 2);
    ctx.arc(x + 24 * s, y + 8 * s, 24 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBackground(t) {
    // sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#7ec6f3');
    grad.addColorStop(0.7, '#ffd9a3');
    grad.addColorStop(1, '#ffb86b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // sun
    ctx.fillStyle = 'rgba(255, 220, 100, 0.9)';
    ctx.beginPath();
    ctx.arc(canvas.width - 120, 130, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 240, 180, 0.4)';
    ctx.beginPath();
    ctx.arc(canvas.width - 120, 130, 80, 0, Math.PI * 2);
    ctx.fill();

    // clouds
    for (const c of clouds) {
      c.x += c.speed;
      if (c.x > canvas.width + 100) c.x = -120;
      drawCloud(c.x, c.y, c.s);
    }

    // ground
    ctx.fillStyle = '#7fcb52';
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
    ctx.fillStyle = '#5fa838';
    ctx.fillRect(0, canvas.height - 50, canvas.width, 6);

    // dashed center divider
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.setLineDash([12, 12]);
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 60);
    ctx.lineTo(canvas.width / 2, canvas.height - 50);
    ctx.stroke();
    ctx.setLineDash([]);

    // side hints
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    const hintY = 88;
    ctx.fillText('TAP  /  ⇧ SHIFT', canvas.width * 0.25, hintY);
    ctx.fillText('TAP  /  SHIFT ⇧', canvas.width * 0.75, hintY);
  }

  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06; // gentle gravity
      p.vx *= 0.99;
      if (p.kind === 'smoke') p.r += 0.6;
      p.life -= p.decay;
    }
    particles = particles.filter(p => p.life > 0);
  }

  function drawParticles() {
    for (const p of particles) {
      if (p.kind === 'smoke') {
        ctx.fillStyle = `rgba(220, 220, 220, ${Math.max(0, p.life) * 0.55})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, p.life);
        // star shape
        const r = 6 + (1 - p.life) * 8;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i * 2 * Math.PI) / 5 - Math.PI / 2;
          const a2 = a + Math.PI / 5;
          ctx.lineTo(p.x + Math.cos(a) * r, p.y + Math.sin(a) * r);
          ctx.lineTo(p.x + Math.cos(a2) * r * 0.45, p.y + Math.sin(a2) * r * 0.45);
        }
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  function loop(now) {
    ctx.save();
    if (shake > 0) {
      const sx = (Math.random() - 0.5) * shake;
      const sy = (Math.random() - 0.5) * shake;
      ctx.translate(sx, sy);
      shake *= 0.85;
      if (shake < 0.5) shake = 0;
    }

    drawBackground(now);
    if (currentMan) drawTubeMan(currentMan, now);
    updateParticles();
    drawParticles();

    // wrong-side red flash (gentle "nope" feedback)
    for (const side of ['left', 'right']) {
      if (wrongFlash[side] > 0) {
        const x = side === 'left' ? 0 : canvas.width / 2;
        ctx.fillStyle = `rgba(255, 60, 60, ${wrongFlash[side] * 0.3})`;
        ctx.fillRect(x, 0, canvas.width / 2, canvas.height);
        wrongFlash[side] *= 0.88;
        if (wrongFlash[side] < 0.02) wrongFlash[side] = 0;
      }
    }

    // success flash overlay
    if (flash > 0) {
      ctx.fillStyle = `rgba(255, 255, 255, ${flash * 0.5})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      flash *= 0.85;
      if (flash < 0.02) flash = 0;
    }

    ctx.restore();
    requestAnimationFrame(loop);
  }

  // --- splash: dismiss on click to prime audio (modifier keys alone don't
  // count as a user activation in most browsers, so a real click is required)
  const splash = document.getElementById('splash');
  splash.addEventListener('click', () => {
    ensureAudio();
    splash.remove();
  });

  spawnMan();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
